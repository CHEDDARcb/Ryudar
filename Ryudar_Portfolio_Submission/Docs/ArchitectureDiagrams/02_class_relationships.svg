<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .title{font:700 30px Segoe UI,Arial,sans-serif;fill:#111827}
      .class{rx:10;ry:10;fill:#fff;stroke:#1f2937;stroke-width:2}
      .abstract{fill:#eff6ff}
      .data{fill:#fefce8}
      .render{fill:#ecfdf5}
      .util{fill:#f5f3ff}
      .name{font:700 17px Segoe UI,Arial,sans-serif;fill:#111827}
      .member{font:13px Consolas,Menlo,monospace;fill:#111827}
      .label{font:13px Segoe UI,Arial,sans-serif;fill:#374151}
      .arrow{stroke:#374151;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .inherit{stroke:#111827;stroke-width:2;fill:none;marker-end:url(#tri)}
      .dash{stroke-dasharray:7 5}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
