<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820">
  <defs>
    <style>
      .title{font:700 30px Segoe UI,Arial,sans-serif;fill:#1b1f24}
      .subtitle{font:16px Segoe UI,Arial,sans-serif;fill:#4b5563}
      .layer{rx:14;ry:14;stroke:#1f2937;stroke-width:2}
      .box{rx:10;ry:10;fill:#fff;stroke:#374151;stroke-width:1.5}
      .h{font:700 18px Segoe UI,Arial,sans-serif;fill:#111827}
      .t{font:14px Consolas,Menlo,monospace;fill:#111827}
      .note{font:13px Segoe UI,Arial,sans-serif;fill:#374151}
      .arrow{stroke:#374151;stroke-width:2;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect width="1280" height="820" fill="#f8fafc"/>
  <text x="42" y="55" class="title">Ryudar Project Architecture Layers</text>
  <text x="42" y="82" class="subtitle">Main source tree: Headers / Sources / Shaders / Assets. Portfolio submission is a packaged copy.</text>

  <rect x="60" y="115" width="1160" height="105" class="layer" fill="#dbeafe"/>
  <text x="90" y="148" class="h">Application Layer</text>
  <rect x="90" y="165" width="235" height="34" class="box"/><text x="108" y="188" class="t">main.cpp</text>
  <rect x="355" y="165" width="235" height="34" class="box"/><text x="373" y="188" class="t">AppBase</text>
  <rect x="620" y="165" width="235" height="34" class="box"/><text x="638" y="188" class="t">Ryudar</text>
  <text x="880" y="188" class="note">Win32 window, D3D11 device, ImGui loop, scene orchestration</text>

  <rect x="60" y="255" width="1160" height="135" class="layer" fill="#dcfce7"/>
  <text x="90" y="288" class="h">Scene and Rendering Layer</text>
  <rect x="90" y="308" width="235" height="34" class="box"/><text x="108" y="331" class="t">SceneObject + Transform</text>
  <rect x="355" y="308" width="235" height="34" class="box"/><text x="373" y="331" class="t">ClassicLit::MeshGroup</text>
  <rect x="620" y="308" width="235" height="34" class="box"/><text x="638" y="331" class="t">CubeMapping</text>
  <rect x="885" y="308" width="235" height="34" class="box"/><text x="903" y="331" class="t">ImageFilter chain</text>
  <text x="90" y="365" class="note">Owns per-object render settings, material, light constants, skybox/IBL resources, and bloom passes.</text>

  <rect x="60" y="425" width="1160" height="125" class="layer" fill="#fef3c7"/>
  <text x="90" y="458" class="h">Geometry and Asset Layer</text>
  <rect x="90" y="478" width="235" height="34" class="box"/><text x="108" y="501" class="t">GeometryGenerator</text>
  <rect x="355" y="478" width="235" height="34" class="box"/><text x="373" y="501" class="t">ModelLoader</text>
  <rect x="620" y="478" width="235" height="34" class="box"/><text x="638" y="501" class="t">MeshData / Vertex</text>
  <rect x="885" y="478" width="235" height="34" class="box"/><text x="903" y="501" class="t">Assets: FBX, PNG, DDS</text>

  <rect x="60" y="585" width="1160" height="105" class="layer" fill="#f3e8ff"/>
  <text x="90" y="618" class="h">Graphics Infrastructure</text>
  <rect x="90" y="638" width="235" height="34" class="box"/><text x="108" y="661" class="t">D3D11Utils</text>
  <rect x="355" y="638" width="235" height="34" class="box"/><text x="373" y="661" class="t">D3D11Exception</text>
  <rect x="620" y="638" width="235" height="34" class="box"/><text x="638" y="661" class="t">ComPtr resources</text>
  <text x="880" y="661" class="note">Buffers, shaders, textures, cubemaps, error handling</text>

  <rect x="60" y="725" width="1160" height="55" class="layer" fill="#fee2e2"/>
  <text x="90" y="760" class="h">GPU Programs</text>
  <text x="260" y="760" class="t">Shaders/*.hlsl: ClassicLit, CubeMapping, Sampling, BlurX/Y, Combine, Normal debug</text>

  <line x1="472" y1="220" x2="472" y2="255" class="arrow"/>
  <line x1="472" y1="390" x2="472" y2="425" class="arrow"/>
  <line x1="472" y1="550" x2="472" y2="585" class="arrow"/>
  <line x1="472" y1="690" x2="472" y2="725" class="arrow"/>
</svg>
